<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/css/lecture/myStudentsDetail.css">
    <link rel="stylesheet" href="/src/css/reset.css">
    <title>CARDI</title>
</head>

<body>
    <div class="top-container">
        <div class="msd-page-container">
            <div class="msd-page-content">
                <div class="msd-header">
                    <div class="msd-header-title-box">
                        <h1 class="msd-header-title">수강생 조회</h1>
                    </div>

                    <div class="msd-header-stats-box">
                        <div class="msd-stat-card">
                            <div class="msd-stat-card-content">
                                <img src="/src/assets/img/manager-student.svg">
                                <p class="msd-stat-label">수강생</p>
                            </div>
                            <p class="msd-stat-value">987</p>
                        </div>

                        <div class="msd-stat-card">
                            <div class="msd-stat-card-content">
                                <img src="/src/assets/img/manager-contents.svg">
                                <p class="msd-stat-label">평균 수강률</p>
                            </div>
                            <p class="msd-stat-value">nn.n %</p>
                        </div>
                    </div>
                </div>

                <!--여기서부터 수정 -->

                <div class="msd-lecture-row">
                    <div class="msd-lecture-info-box">
                        <div class="msd-lecture-stats">
                            <span class="msd-student-name">수강생 이름</span>
                            <span class="msd-student-email">수강생 이메일</span>
                            <span class="msd-student-process">nn %</span>
                            <span class="msd-student-stat">수강완료</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

<script src="/src/js/components/includeHeader.js"></script>
<script src="/src/js/components/includeNav.js"></script>

</html>
