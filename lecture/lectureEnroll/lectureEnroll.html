<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/src/css/reset.css">
    <style>
        .le-side-margin {
            margin: 0 150px;
        }

        #le-title {
            font-size: 48px;
            font-weight: 600;
            margin: 35px auto 0px 35px;
        }

        #le-preview {
            font-size: 20px;
            font-weight: 400;
            margin: 0px auto 15px 35px;
        }

        .le-enroll-container {
            width: 89%;
            display: flex;
            flex-direction: column;
            gap: 60px;
        }

        .le-data-container {
            width: 100%;
            border-radius: 20px;
            border: 2px solid #A0A0A0;
            background: #FCFCFC;
        }
    </style>
</head>

<body>
    <div class="container">
        <main class="le-side-margin">
            <section id="le-title">강의 등록</section>
            <p id="le-preview">새로운 강의를 등록하고 커리큘럼을 구성하세요</p>
            <article class="le-enroll-container">
                <article class="le-data-container"></article>
                <article class="le-curry-container"></article>
            </article>
        </main>
    </div>

    <script type="module" src="/src/js/components/includeHeader.js"></script>
    <script type="module" src="/src/js/components/includeNav.js"></script>
</body>

</html>
