<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/css/lecture/myStudents.css">
    <link rel="stylesheet" href="/src/css/reset.css">
    <title>CARDI</title>
</head>

<body>
    <div class="top-container">
        <div class="ms-page-container">
            <div class="ms-page-content">
                <div class="ms-header">
                    <div class="ms-header-title-box">
                        <h1 class="ms-header-title">수강생 조회</h1>
                    </div>

                    <div class="ms-header-stats-box">
                        <div class="ms-stat-card">
                            <div class="ms-stat-card-content">
                                <img src="/src/assets/img/manager-student.svg">
                                <p class="ms-stat-label">수강생</p>
                            </div>
                            <p class="ms-stat-value">987</p>
                        </div>

                        <div class="ms-stat-card">
                            <div class="ms-stat-card-content">
                                <img src="/src/assets/img/manager-contents.svg">
                                <p class="ms-stat-label">평균 수강률</p>
                            </div>
                            <p class="ms-stat-value">nn.n %</p>
                        </div>
                    </div>
                </div>

                <div class="ms-lecture-row">
                    <p class="ms-lecture-title">강의 제목 텍스트가 들어가는 자리입니다.</p>

                    <div class="ms-lecture-info-box">
                        <div class="ms-lecture-stats">
                            <span class="ms-student-number">수강생: <span class="studentNumber">n명</span></span>
                            <span class="ms-student-ing">수강 중: <span class="studenting">n명</span></span>
                            <span class="ms-student-ed">수강 완료: <span class="studented">n명</span></span>
                        </div>
                        <span class="ms-lecture-category">CSS</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

<script src="/src/js/components/includeHeader.js"></script>
<script src="/src/js/components/includeNav.js"></script>

</html>
