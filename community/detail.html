<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../src/css/reset.css">
    <link rel="stylesheet" href="../src/css/community/regist.css">
    <link rel="stylesheet" href="../src/css/community/detail.css">
</head>

<body>
    <div class="top-container">
        <main class="cm-main-ct">
            <section class="cm-left-ct">
                <div class="cm-top-ct">
                    <button><img src="../src/assets/img/community_backBtn.svg"></button>
                    <p>커뮤니티</p>
                </div>
                <article class="cmd-content-ct">
                    <div class="cmd-content-title-ct">
                        <h3></h3>
                        <img src="../src/assets/img/community-dot-btn.svg" hidden>
                        <div></div>
                    </div>
                    <div class="cmd-content-user-info">
                        <p class="cmd-user-info-name"></p>
                        <p class="cmd-user-info-date"></p>
                    </div>
                    <p class="cmd-question-p"></p>
                </article>
                <article class="cmd-reply-ct" id="cmd-student-reply-ct">
                    <p>답변</p>
                    <div>
                        <div class="cmd-reply-lecture-info-ct" hidden>
                            <p class="cmd-reply-lecturer-name"></p>
                            <img src="../src/assets/img/community-dot-btn.svg" hidden>
                        </div>
                        <p class="cmd-reply-content">아직 답변이 없습니다. </p>
                    </div>
                </article>
                <article class="cmd-reply-ct" id="cmd-lecture-reply-ct" hidden>
                    <p>답변 작성하기</p>
                    <div>
                        <textarea placeholder="답변을 작성해주세요." id="cmd-textarea"></textarea>
                        <button class="cmd-reply-regits-btn"><img
                                src="../src/assets/img/commuhity-send-btn.svg"></button>
                    </div>
                </article>
                <article class="cmd-reply-ct" id="cmd-lecture-modify-ct" hidden>
                    <p>답변 수정하기</p>
                    <div>
                        <textarea></textarea>
                        <button><img src="../src/assets/img/commuhity-send-btn.svg"></button>
                    </div>
                </article>
            </section>
            <section class="cm-right-ct">
                <img>
                <h3>강의 제목</h3>
                <p id="cm-lecturer-name">강사명: </p>
                <p id="cm-use-time">이용 기간: 무제한</p>
                <p id="cm-content-time">강의 시간: </p>
                <p id="cm-content-level">난이도: </p>
                <button>강의 상세 보러가기</button>
            </section>
        </main>
    </div>

    <div class="active-modal"></div>
    <script type="module" src="../src/js/components/includeHeader.js"></script>
    <script type="module" src="../src/js/components/includeNav.js"></script>
    <script type="module" src="../src/js/components/modalOneButton.js"></script>
    <script type="module" src="../src/js/components/modalTwoButton.js"></script>
    <script type="module" src="../src/js/community/detail.js"></script>
</body>

</html>
