<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../src/css/reset.css">
    <link rel="stylesheet" href="../src/css/community/regist.css">
</head>

<body>
    <div class="top-container">
        <main class="cm-main-ct">
            <section class="cm-left-ct">
                <div class="cm-top-ct">
                    <button><img src="../src/assets/img/community_backBtn.svg"></button>
                    <p>커뮤니티</p>
                </div>
                <article class="cm-title-ct">
                    <input id='cm-title-input' placeholder="질문 제목을 작성해주세요.">
                    <div>
                        <p class="cm-regist-name">작성자</p>
                        <p class="cm-regist-date">작성 일시</p>
                    </div>
                </article>
                <article class="cm-content-ct">
                    <textarea id="cm-content-textarea" placeholder="질문 내용을 작성해주세요." maxlength="1000"></textarea>
                    <p>0/1000</p>
                </article>
                <button class="cm-regist-btn">등록하기</button>
            </section>
            <section class="cm-right-ct">
                <img>
                <h3>강의 제목</h3>
                <p id="cm-lecturer-name">강사명: </p>
                <p id="cm-use-time">이용 기간: 무제한</p>
                <p id="cm-content-time">강의 시간: </p>
                <p id="cm-content-level">난이도: </p>
                <button>신청하기</button>
            </section>
        </main>
    </div>

    <div class="active-modal"></div>
    <script type="module" src="/src/js/components/includeHeader.js"></script>
    <script type="module" src="/src/js/components/includeNav.js"></script>
    <script type="module" src="/src/js/components/modalOneButton.js"></script>
    <script type="module" src="/src/js/components/modalTwoButton.js"></script>
    <script type="module" src="/src/js/community/regist.js"></script>
</body>

</html>
