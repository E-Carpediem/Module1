<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../src/css/reset.css">
    <link rel="stylesheet" href="../src/css/components/content-detail.css">
    <link rel="stylesheet" href="../src/css/community/community.css">
</head>

<body>
    <div class="top-container">
        <main class="cd-side-margin">
            <article class="cd-lecture-img">사진</article>
            <article class="cd-main-container">
                <article class="cd-main-content">
                    <article class="cd-main-nav">
                        <p class="cd-nav-title">강의소개</p>
                        <p class="cd-nav-title">커리큘럼</p>
                        <p class="cd-nav-title">커뮤니티</p>
                    </article>
                    <article class="cd-long-line">
                        <section class="cd-short-line" id="cd-short-line1"></section>
                        <section class="cd-short-line" id="cd-short-line2"></section>
                    </article>
                    <article id="cd-curry-container">
                        <section class="cd-content-index" id="cd-content-curry">커뮤니티</section>
                        <sectiion class="cm-search-filter-ct">
                            <button class="cm-all-reply-btn">전체</button>
                            <button class="cm-no-reply-btn">미답변</button>
                            <button class="cm-reply-btn">답변</button>
                            <form class="cm-search-div">
                                <input type="text" placeholder="검색어를 입력해주세요">
                                <button><img src="../src/assets/img/searchComunity.svg"></button>
                            </form>
                        </sectiion>
                        <article class="cm-community-questions-ct">
                            <!-- 질문 들어올 자리 -->
                        </article>
                    </article>
                </article>
                <article class="cm-content-box">
                    <section id="price">강의 제목</section>
                    <article class="cd-content-info">
                        <section id="cd-lecturer-name">강사명: </section>
                        <section id="cd-use-time">이용 기간: 무제한</section>
                        <section id="cd-content-time">강의 시간: </section>
                        <section id="cd-content-level">난이도: </section>
                    </article>
                    <article class="cm-button-ct-student">
                        <button class="cd-btn" id="cd-btn-color1">질문하기</button>
                        <button class="cd-btn modal-open-two-btn" id="cd-btn-color2"
                            data-url="/lecture/lectureUpdate/lectureUpdate.html" data-message="
                    해당 강의를 신청하시겠습니까?">신청하기</button>
                    </article>
                    <article class="cm-button-ct-lecturer cm-hidden-btn">
                        <button class="cd-btn" id="cd-btn-color1">수강생 조회</button>
                        <div>
                            <button class="cd-btn modal-open-two-btn" id="cd-btn-color3"
                                data-url="/lecture/lectureUpdate/lectureUpdate.html" data-message="
                    수정하시겠습니까?<br>
                    확인 버튼을 누르면 강의 수정 페이지로 이동합니다.">수정하기</button>
                            <button class="cd-btn modal-open-two-btn" id="cd-btn-color2"
                                data-url="/lecture/lectureUpdate/lectureUpdate.html">삭제하기</button>
                        </div>
                    </article>
                    <article class="cm-button-ct-manager  cm-hidden-btn">
                        <button class="cd-btn modal-open-two-btn" id="cd-btn-color2"
                            data-url="/lecture/lectureUpdate/lectureUpdate.html">삭제하기</button>
                    </article>
                </article>
            </article>
        </main>
    </div>

    <div class="active-modal"></div>
    <script type="module" src="/src/js/components/includeHeader.js"></script>
    <script type="module" src="/src/js/components/includeNav.js"></script>
    <script type="module" src="/src/js/components/modalOneButton.js"></script>
    <script type="module" src="/src/js/components/modalTwoButton.js"></script>
    <script type="module" src="/src/js/community/community.js"></script>
</body>

</html>
