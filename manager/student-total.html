<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/src/css/reset.css">
    <link rel="stylesheet" href="/src/css/manager/common.css">
    <link rel="stylesheet" href="/src/css/manager/studentTotalCheck.css">
</head>

<body>
    <div class="top-container">
        <p class="manager-title"> 회원 관리 </p>
        <p class="manager-sub-title"> 회원 목록을 관리하고 조회하세요. </p>

        <main class="tms-main-ct">
            <section class="tms-main-category tm-user-management">
                <p> 전체 </p>
                <p> 수강생 </p>
                <p> 강사 </p>
            </section>
            <hr class="tms-main-hr">

            <article class="tms-search-ct">
                <div class="tms-search-input-ct">
                    <img src="/src/assets/img/manager-search.svg">
                    <input type="text" placeholder="제목 또는 담당 강사명으로 검색...">
                </div>

                <button class="tms-search-array-btn manager-array-common">
                    <img src="/src/assets/img/manager-array.svg">
                    정렬
                    <div class="m-array">
                        <p> 가입일자</p>
                        <div></div>
                        <p> 가나다순</p>
                    </div>
                </button>

                <button class="tms-search-filter-btn manager-fileter-common">
                    <img src="/src/assets/img/manager-filter.svg">
                    필터
                    <div class="m-fileter">
                        <p> 구독중</p>
                        <div></div>
                        <p> 미구독</p>
                    </div>
                </button>
            </article>

            <article class="tms-content-ct">
                <section class="tms-content-top-ct">
                    <p> No. </p>
                    <p> 회원번호 </p>
                    <p> 이름 </p>
                    <p> 구분 </p>
                    <p> 전화번호 </p>
                    <p> 수강 </p>
                    <p> 가입일자 </p>
                    <p> 멤버십 가입일자 </p>
                    <p> 멤버십 </p>
                </section>

                <section class="tms-bottom-number">
                    <p> 1 </p>
                    <p> 2 </p>
                    <p> 3 </p>
                    <p> 4 </p>
                    <p> 5 </p>
                </section>
            </article>
        </main>
    </div>

    <script src="/src/js/components/includeNav.js"></script>
    <script src="/src/js/components/includeHeader.js"></script>
    <script src="/src/js/manager/userManagement.js"></script>
    <script src="/src/js/manager/studentTotalCheck.js"></script>
</body>

</html>
