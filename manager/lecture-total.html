<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/src/css/reset.css">
    <link rel="stylesheet" href="/src/css/manager/common.css">
    <link rel="stylesheet" href="/src/css/manager/lecture-total.css">
</head>

<body>
    <div class="top-container">
        <p class="manager-title"> 콘텐츠 관리 </p>
        <p class="manager-sub-title"> 강의 목록을 관리하고 조회하세요. </p>

        <main class="tc-main-ct">
            <span class="tc-main-title"> 전체 </span>
            <hr class="tc-main-hr">

            <article class="tc-search-ct">
                <div class="tc-search-input-ct">
                    <img src="/src/assets/img/manager-search.svg">
                    <input type="text" placeholder="제목 또는 담당 강사명으로 검색...">
                </div>

                <button class="tc-search-array-btn manager-array-common">
                    <img src="/src/assets/img/manager-array.svg">
                    정렬
                    <div class="m-array">
                        <p> 제목순</p>
                        <div></div>
                        <p> 강사명</p>
                    </div>
                </button>

                <button class="tc-search-filter-btn manager-fileter-common">
                    <img src="/src/assets/img/manager-filter.svg">
                    필터
                    <div class="m-fileter">
                        <p> 등록중</p>
                        <div></div>
                        <p> 미등록</p>
                    </div>
                </button>
            </article>

            <article class="tc-content-ct">
                <section class="tc-content-top-ct">
                    <p> No. </p>
                    <p> 강의번호 </p>
                    <p> 제목 </p>
                    <p> 담당 강사 </p>
                    <p> 수강생 수 </p>
                    <p> 강의 자료 수 </p>
                    <p> 게시 일자 </p>
                </section>

                <section class="tc-bottom-number">
                    <p> 1 </p>
                    <p> 2 </p>
                    <p> 3 </p>
                    <p> 4 </p>
                    <p> 5 </p>
                </section>
            </article>
        </main>
    </div>

    <div class="active-modal">
        
    </div>

    <script src="/src/js/components/includeNav.js"></script>
    <script src="/src/js/components/includeHeader.js"></script>
    <!-- <script src="/src/js/manager/userManagement.js"></script> -->
    <script src="/src/js/manager/lecture-total.js"></script>
</body>

</html>
