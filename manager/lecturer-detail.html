<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARDI</title>
    <link rel="icon" href="/src/assets/img/headLogo.png" />
    <link rel="stylesheet" href="/src/css/reset.css">
    <link rel="stylesheet" href="/src/css/manager/common.css">
    <link rel="stylesheet" href="/src/css/manager/lecturer-detail.css">
</head>

<body>
    <div class="top-container manager-background">
        <p class="manager-title"> 회원관리 </p>
        <p class="manager-sub-title"> 회원 목록을 관리하고 조회하세요 </p>

        <main class="tmm-main-lecture-ct">
            <section class="tmm-lecture-inf-ct">
                <article class="tmm-lecture-inf">
                    <div class="tmm-lecture-inf-profile">
                    </div>

                </article>
                <article class="tmm-lector-main-lecture">
                    <div class="tmm-lector-lecture">
                        <div class="tmm-lector-category"></div>
                        <div class="tmm-lector-lecture-coment-ct">
                            <p class="tmm-lector-lecture-title"> 강사의 대표 강의1</p>
                            <p class="tmm-lector-oneline-example"> 강의 한줄 설명</p>
                        </div>
                    </div>

                    <div class="tmm-lector-lecture">
                        <div class="tmm-lector-category"></div>
                        <div class="tmm-lector-lecture-coment-ct">
                            <p class="tmm-lector-lecture-title"> 강사의 대표 강의1</p>
                            <p class="tmm-lector-oneline-example"> 강의 한줄 설명</p>
                        </div>
                    </div>

                    <div class="tmm-lector-lecture">
                        <div class="tmm-lector-category"></div>
                        <div class="tmm-lector-lecture-coment-ct">
                            <p class="tmm-lector-lecture-title"> 강사의 대표 강의1</p>
                            <p class="tmm-lector-oneline-example"> 강의 한줄 설명</p>
                        </div>
                    </div>

                    <div class="tmm-lector-lecture">
                        <div class="tmm-lector-category"></div>
                        <div class="tmm-lector-lecture-coment-ct">
                            <p class="tmm-lector-lecture-title"> 강사의 대표 강의1</p>
                            <p class="tmm-lector-oneline-example"> 강의 한줄 설명</p>
                        </div>
                    </div>

                </article>
            </section>

            <section class="tmm-lector-list-ct">
                <span class="tmm-lector-list-title"> 강의 목록 </span>
                <hr class="tmm-lector-list-hr">

                <article class="tmm-lector-search-ct">
                    <div class="tmm-lector-search-input-ct">
                        <img src="/src/assets/img/manager-search.svg">
                        <input type="text" placeholder="제목 또는 담당 강사명으로 검색...">
                    </div>

                    <button class="tmm-lector-search-array-btn manager-array-common">
                        <img src="/src/assets/img/manager-array.svg">
                        정렬
                        <div class="tm-active-search-btn m-array">
                            <p> 가입일자</p>
                            <div></div>
                            <p> 가나다순</p>
                        </div>
                    </button>

                    <button class="tmm-lector-search-filter-btn manager-fileter-common">
                        <img src="/src/assets/img/manager-filter.svg">
                        필터
                        <div class="tm-active-fileter-btn m-fileter">
                            <p> 구독중</p>
                            <div></div>
                            <p> 등록중</p>
                            <div></div>
                            <p> 미구독</p>
                            <div></div>
                            <p> 미등록</p>
                        </div>
                    </button>
                </article>

                <article class="tmm-lector-content-ct">
                    <section class="tmm-lector-content-top-ct">
                        <p> No. </p>
                        <p> 강의번호 </p>
                        <p> 제목 </p>
                        <p> 수강생 수 </p>
                        <p> 강의 자료 수 </p>
                        <p> 게시 일자 </p>
                    </section>

                    <section class="tmm-lector-bottom-number">
                        <p> 1 </p>
                        <p> 2 </p>
                        <p> 3 </p>
                        <p> 4 </p>
                        <p> 5 </p>
                    </section>
                </article>
            </section>
        </main>

        <div class="active-modal"></div>
    </div>

    <script src="/src/js/components/includeHeader.js"></script>
    <script src="/src/js/components/includeNav.js"></script>
    <!-- <script src="/src/js/manager/userManagement.js"></script> -->
    <script src="/src/js/manager/lecturer-detail.js"></script>
    <script src="/src/js/dummy-data.js"></script>
</body>

</html>
