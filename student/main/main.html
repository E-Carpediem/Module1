<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./main.css">
    <title>CARDI</title>
</head>

<!-- header와 nav는 components에서 include -->
<div class="lecture-container">
    <div class="lecture-content">
        <h1 class="lecture-title">강의 목록</h1>

        <div class="search-box">
            <input type="search" placeholder="제목으로 검색..." class="search-input" />
        </div>

        <div class="category-list">
            <button class="category-btn active">전체</button>
            <button class="category-btn">HTML</button>
            <button class="category-btn">CSS</button>
            <button class="category-btn">JavaScript</button>
            <button class="category-btn">C+</button>
            <button class="category-btn">Python</button>
        </div>

        <div class="lecture-list">
            <div class="lecture-card">
                <div class="lecture-img"></div>
                <div class="lecture-info">
                    <h2 class="lecture-card-title">강의 제목</h2>
                    <p class="lecture-preview">강의 요약 텍스트</p>
                    <span class="lecturer-name">강사명</span>
                    <span class="lecture-category">HTML</span>
                </div>
            </div>

            <div class="lecture-card">
                <div class="lecture-img"></div>
                <div class="lecture-info">
                    <h2 class="lecture-card-title">강의 제목</h2>
                    <p class="lecture-preview">강의 요약 텍스트</p>
                    <span class="lecturer-name">강사명</span>
                    <span class="lecture-category">CSS</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="main.js"></script>
</body>

</html>
