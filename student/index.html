<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/css/student/index.css">
    <link rel="stylesheet" href="/src/css/reset.css">
    <title>CARDI</title>
    <link rel="icon" href="/src/assets/img/headLogo.png" />
</head>
 
<body>
    <div class="top-container">
        <div class="ct-lecture-container">
            <div class="ct-lecture-content">
                <h1 class="ct-lecture-title">강의 목록</h1>

                <div class="ct-search-box">
                    <img src="/src/assets/img/searchIcon.svg" alt="검색 아이콘" class="ct-search-icon" />
                    <input type="search" placeholder="제목으로 검색..." class="ct-search-input" />
                </div>

                <div class="ct-category-list">
                    <button class="ct-category-btn active">전체</button>
                    <button class="ct-category-btn">HTML</button>
                    <button class="ct-category-btn">CSS</button>
                    <button class="ct-category-btn">JavaScript</button>
                    <button class="ct-category-btn">C+</button>
                    <button class="ct-category-btn">Python</button>
                </div>

                <div class="ct-lecture-list"></div>
                <div class="ct-no-results" style="display:none;">
                    일치하는 강의가 없습니다.
                </div>
            </div>
        </div>
    </div>

    <script src="/src/js/components/includeHeader.js"></script>
    <script src="/src/js/components/includeNav.js"></script>
    <script src="/src/js/student/index.js"></script>
</body>

</html>
