<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/css/student/shoppingCart.css">
    <link rel="stylesheet" href="/src/css/reset.css">
    <title>CARDI</title>
</head>

<body>
    <div class="container">
        <div class="sc-cart-container">
            <div class="sc-cart-content">
                <h1 class="sc-cart-title">장바구니</h1>

                <div class="sc-cart-main">
                    <div class="sc-cart-left">
                        <div class="sc-cart-actions">
                            <button class="sc-cart-btn sc-select-all">일괄 선택</button>
                            <button class="sc-cart-btn sc-delete-all">일괄 삭제</button>
                        </div>

                        <div class="sc-cart-list">
                            <div class="sc-cart-item">
                                <input type="checkbox" class="sc-cart-check" />
                                <div class="sc-cart-thumb"></div>
                                <div class="sc-cart-info">
                                    <h2 class="sc-cart-item-title">강의 제목</h2>
                                    <p class="sc-cart-item-meta">강사명 | nn분 nn초</p>
                                    <p class="sc-cart-item-price">가격: nn,nnn 원</p>
                                </div>
                                <button class="sc-cart-btn move">강의로 이동</button>
                            </div>

                        </div>
                    </div>


                    <div class="sc-cart-summary">
                        <p class="sc-cart-total-count">총 강의 수 : n개</p>
                        <div class="sc-selected-item">

                        </div>
                        <div class="sc-cart-summary-bottom">
                            <p class="sc-cart-selected-count">선택된 강의 : n개</p>
                            <p class="sc-cart-total-price">총 가격: nnn,nnn 원</p>
                            <div class="sc-cart-summary-actions">
                                <button class="sc-cart-btn delete">삭제하기</button>
                                <button class="sc-cart-btn apply">신청하기</button>
                            </div>
                        </div>
                    </div>
                </div>



                <script src="/src/js/components/includeHeader.js"></script>
                <script src="/src/js/components/includeNav.js"></script>
                <script src="./shoppingCart.js"></script>
</body>

</html>
