<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../../src/css/account/signUp2.css">
</head>

<body>
    <main>
        <h2>수강생 회원가입</h2>
        <form>
            <label for="userId">아이디</label>
            <div class="su-id-check-ct">
                <input placeholder="아이디 입력" type="text" id="userId"><button type="button">중복확인</button>
            </div>
            <p>2~8자로 입력해주세요</p>

            <label for="userPwd">비밀번호</label>
            <input placeholder="비밀번호 입력" type="password" id="userPwd">
            <p>2~8자로 입력해주세요</p>

            <label for="userPwdChekc">비밀번호 확인</label>
            <input placeholder="비밀번호 재입력" type="password" id="userPwdChekc">
            <p>2~8자로 입력해주세요</p>

            <label for="userName">이름</label>
            <input placeholder="이름 입력" type="text" id="userName">


            <label for="userAge">나이</label>
            <input placeholder="나이 입력" type="number" id="userAge">


            <label for="userPone">전화번호</label>
            <input placeholder="전화번호 입력" type="number" id="userPone">
            <p>2~8자로 입력해주세요</p>

            <label for="userEmail">이메일</label>
            <input placeholder="이메일 입력" id="userEmail" type="email">


            <label>성별</label>
            <div class="su-check-ct">
                <input type="radio" id="male" name="gender"><label for="male">남성</label>
                <input type="radio" id="female" name="gender"><label for="female">여성</label>
            </div>

            <label for="userBirth">생년월일</label>
            <input placeholder="생년월일" type="date" id="userBirth">


            <section>
                <label>약관동의</label>
                <div class="su-agree-ct">
                    <div>
                        <input type="checkbox"><label>모두 동의합니다.</label>
                    </div>
                    <div>
                        <input type="checkbox"><label>이용약관 동의</label><span>자세히 보기</span><br>
                    </div>
                    <div>
                        <input type="checkbox"><label>개인정보 처리방침 동의</label><span>자세히 보기</span><br>
                    </div>
                    <div>
                        <input type="checkbox"><label>마케팅 정보 수신 동의</label><span>자세히 보기</span><br>
                    </div>
                </div>
            </section>
            <button class="su-signup-btn" type="submit">회원가입</button>
        </form>

    </main>
</body>

</html>
