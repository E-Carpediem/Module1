<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARDI</title>
    <link rel="icon" href="/src/assets/img/headLogo.png" />
    <link rel="stylesheet" href="/src/css/account/signup.css">
</head>

<body>
    <div class="top-container">
        <main class="su-signup-main">
            <section class="su-role-ct">
                <h2>회원가입</h2>
                <p>만 14세 이상부터 회원가입이 가능합니다</p>
                <p>회원 유형을 선택하여 시작하세요</p>
                <article class="su-btn-ct">
                    <button class="su-student-btn">
                        <img src="../src/assets/img/studentIcon.png" alt="수강생 아이콘">
                        <h3>수강생</h3>
                        <p>강의를 수강하고 싶으신가요?</p>
                    </button>
                    <button class="su-lecture-btn">
                        <img src="../src/assets/img/lectureIcon.png" alt="강사 아이콘">
                        <h3>강사</h3>
                        <p>강의를 진행하고 싶으신가요?</p>
                    </button>
                </article>
            </section>
            <section class="su-info-ct">
                <div>
                    <img src="../src/assets/img/signUp1Icon.png" alt="회원가입 1아이콘">
                    <p>간편한 가입</p>
                    <p>빠르고 쉬운 회원가입</p>
                </div>
                <div>
                    <img src="../src/assets/img/signUp2Icon.png" alt="회원가입 2아이콘">
                    <p>다양한 강의</p>
                    <p>풍부한 학습 콘텐츠 제공</p>
                </div>
                <div>
                    <img src="../src/assets/img/signUp3Icon.png" alt="회원가입 3아이콘">
                    <p>다양한 강사진</p>
                    <p>검증된 강사와 함께</p>
                </div>
            </section>
        </main>
    </div>
    <script src="/src/js/components/includeHeader.js"></script>
    <script src="/src/js/account/signUpRoute.js"></script>

</body>

</html>
