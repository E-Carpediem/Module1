<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../../src/css/account/login.css">
</head>

<body>
    <div class="top-container">
        <main class="l-login-main">

            <h2>로그인</h2>
            <form>
                <label for="su-login-id">아이디</label>
                <input placeholder="아이디를 입력하세요." type="text" id="su-login-id">
                <label for="su-login-pwd">비밀번호</label>
                <input placeholder="비밀번호를 입력하세요." type="password" id="su-login-pwd">
                <div class="su-login-check-ct">
                    <input id="l-signup-auto" type="checkbox">
                    <label for="l-signup-auto">자동 로그인</label>
                </div>
                <button class="l-login-btn" type="submit">
                    로그인
                </button>
                <button class="l-signup-btn" type="button">
                    회원가입
                </button>
            </form>

        </main>
    </div>
    <div class="active-modal"></div>
    <script src="/src/js/components/includeHeader.js"></script>
    <script src="/src/js/account/signUpRoute.js"></script>
    <script src="/src/js/account/login.js"></script>
</body>

</html>
